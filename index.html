<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Anniversary ♡</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&family=Kanit:wght@300;400;500&family=Orbitron:wght@600&family=Caveat:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff8fa3;
            --secondary: #ffcad4;
            --bg: #fff5f7;
            --text: #7a5c61;
        }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Prompt', sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(#ffcad4 0.5px, transparent 0.5px);
            background-size: 20px 20px;
            color: var(--text);
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        /* --- Login Page --- */
        #login-page {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .shake { animation: shake 0.4s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
        .pass-dots { display: flex; gap: 15px; margin-bottom: 20px; }
        .dot { width: 15px; height: 15px; border: 2px solid var(--primary); border-radius: 50%; transition: 0.2s; }
        .dot.active { background: var(--primary); transform: scale(1.2); box-shadow: 0 0 10px var(--primary); }
        #error-msg { height: 20px; color: var(--primary); font-size: 0.8rem; margin-bottom: 20px; }
        .keypad { display: grid; grid-template-columns: repeat(3, 80px); gap: 15px; }
        .key { 
            width: 80px; height: 80px; background: white; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: 0.1s; -webkit-tap-highlight-color: transparent;
        }
        .key:active { transform: scale(0.9); background: var(--secondary); }

        /* --- Main Content --- */
        #main-app { display: none; padding-bottom: 120px; }
        section { min-height: 100vh; padding: 40px 20px; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }

        .calendar-wrap { display: flex; gap: 10px; margin-bottom: 10px; }
        .calendar-card {
            background: white; width: 90px; height: 110px; border-radius: 15px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.05); overflow: hidden; border: 1px solid #eee;
        }
        .cal-top { background: var(--primary); height: 28px; color: white; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 600; }
        .cal-num { font-size: 1.5rem; font-weight: 600; color: var(--text); padding-top: 15px; display: block; text-align: center; }
        .cal-unit { font-size: 0.6rem; color: #bbb; display: block; text-align: center; }

        .clock-container {
            background: #fff; padding: 15px 25px; border-radius: 50px;
            box-shadow: 0 10px 25px rgba(255, 143, 163, 0.2);
            border: 4px solid var(--secondary); display: flex; gap: 10px; align-items: center; margin: 20px 0;
        }
        .clock-val { font-family: 'Orbitron', sans-serif; font-size: 1.5rem; color: var(--primary); }

        /* --- Photo Grid (HEART SHAPE 10 IMAGES) --- */
        .heart-grid { 
            display: grid; 
            grid-template-columns: repeat(5, 65px); 
            grid-template-rows: repeat(5, 65px); 
            gap: 10px; margin: 0 auto;
        }
        .img-item { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; border: 2px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.1); cursor: pointer; }
        
        /* Heart Positions */
        .p1 { grid-column: 2; grid-row: 1; }
        .p2 { grid-column: 4; grid-row: 1; }
        .p3 { grid-column: 1; grid-row: 2; }
        .p4 { grid-column: 2; grid-row: 2; }
        .p5 { grid-column: 3; grid-row: 2; }
        .p6 { grid-column: 4; grid-row: 2; }
        .p7 { grid-column: 5; grid-row: 2; }
        .p8 { grid-column: 2; grid-row: 3; }
        .p9 { grid-column: 3; grid-row: 4; }
        .p10 { grid-column: 4; grid-row: 3; }

        /* --- Envelope & Paper --- */
        .envelope-container { position: relative; height: 450px; display: flex; align-items: center; justify-content: center; width: 100%; }
        .envelope { width: 240px; height: 150px; background: #ffc1cc; border-radius: 0 0 10px 10px; position: relative; cursor: pointer; z-index: 10; margin-top: 120px; }
        .envelope::before { content: ''; position: absolute; top: -100px; left: 0; border-left: 120px solid transparent; border-right: 120px solid transparent; border-bottom: 100px solid #ff8fa3; transition: 0.5s; z-index: 12; transform-origin: bottom; }
        .envelope.open::before { transform: rotateX(180deg); z-index: 1; }
        .paper { position: absolute; top: 10px; left: 10px; width: 220px; height: 130px; background: white; border-radius: 5px; transition: 0.7s; z-index: 5; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .envelope.open .paper { transform: translateY(-220px); height: 380px; width: 300px; left: -30px; z-index: 15; box-shadow: 0 15px 35px rgba(0,0,0,0.15); }

        /* --- Gift Boxes --- */
        .boxes-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 35px; max-width: 300px; margin: 0 auto; }
        .gift-box { font-size: 65px; cursor: pointer; transition: 0.3s; display: inline-block; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1)); }
        .box-shake { animation: box-shake 0.8s ease-in-out; }
        @keyframes box-shake {
            0%, 100% { transform: scale(1) rotate(0); }
            20% { transform: scale(1.1) rotate(15deg); }
            40% { transform: scale(1.1) rotate(-15deg); }
            60% { transform: scale(1.1) rotate(10deg); }
            80% { transform: scale(1.1) rotate(-10deg); }
        }

        /* --- UI Elements --- */
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); z-index: 10000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { display: flex; flex-direction: column; align-items: center; }
        .polaroid { background: white; padding: 12px 12px 50px 12px; box-shadow: 0 20px 50px rgba(0,0,0,0.15); border-radius: 2px; max-width: 240px; position: relative; }
        .polaroid img { width: 100%; height: auto; }
        .polaroid-text { font-family: 'Kanit', sans-serif; font-size: 0.9rem; color: #666; margin-top: 15px; text-align: center; }
        
        .ticket { width: 280px; background: white; border-radius: 15px; box-shadow: 0 15px 35px rgba(255, 143, 163, 0.3); border: 2px solid var(--primary); overflow: hidden; }
        .ticket-header { background: var(--primary); color: white; padding: 10px; font-size: 0.7rem; font-weight: 600; text-align: center; }
        .ticket-content { padding: 30px 20px; border-bottom: 2.5px dashed var(--secondary); text-align: center; }
        .ticket-prize { font-size: 1.1rem; font-weight: 600; color: var(--primary); margin: 5px 0; }
        .ticket-footer { font-size: 0.55rem; color: #bbb; padding: 8px; text-align: center; }

        nav { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); background: rgba(255,255,255,0.95); padding: 10px 25px; border-radius: 40px; display: flex; gap: 20px; z-index: 1000; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        nav a { text-decoration: none; font-size: 24px; }
        .btn-close { background: var(--primary); color: white; border: none; padding: 10px 30px; border-radius: 25px; cursor: pointer; margin-top: 20px; font-family: 'Prompt'; }
        
        .emoji-fly { position: absolute; pointer-events: none; font-size: 28px; animation: flyUp 2.5s ease-out forwards; z-index: 10001; }
        @keyframes flyUp { 0% { transform: translateY(0) scale(0.5); opacity: 0; } 20% { opacity: 1; } 100% { transform: translateY(-400px) rotate(20deg) scale(1.5); opacity: 0; } }
    </style>
</head>
<body>

    <div id="login-page">
        <h3 style="font-weight: 300; color: var(--primary); margin-bottom: 10px;">Enter Password ♡</h3>
        <div id="error-msg"></div>
        <div class="pass-dots">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
        <div class="keypad">
            <div class="key" onclick="addNum('1')">1</div><div class="key" onclick="addNum('2')">2</div><div class="key" onclick="addNum('3')">3</div>
            <div class="key" onclick="addNum('4')">4</div><div class="key" onclick="addNum('5')">5</div><div class="key" onclick="addNum('6')">6</div>
            <div class="key" onclick="addNum('7')">7</div><div class="key" onclick="addNum('8')">8</div><div class="key" onclick="addNum('9')">9</div>
            <div style="width:80px"></div><div class="key" onclick="addNum('0')">0</div><div class="key" onclick="clearPass()" style="font-size:14px; color:var(--primary);">ลบ</div>
        </div>
    </div>

    <div id="main-app">
        <section id="time-sec">
            <div style="font-size: 1rem; color: var(--primary); margin-bottom: 20px;">เราเดินมาด้วยกันแล้ว...</div>
            <div class="calendar-wrap">
                <div class="calendar-card"><span class="cal-top">ปี</span><span class="cal-num" id="y">0</span><span class="cal-unit">YEARS</span></div>
                <div class="calendar-card"><span class="cal-top">เดือน</span><span class="cal-num" id="m">0</span><span class="cal-unit">MONTHS</span></div>
                <div class="calendar-card"><span class="cal-top">วัน</span><span class="cal-num" id="d">0</span><span class="cal-unit">DAYS</span></div>
            </div>
            <div class="clock-container">
                <span class="clock-val" id="ch">00</span> : <span class="clock-val" id="cm">00</span> : <span class="clock-val" id="cs">00</span>
            </div>
            <p style="font-size: 0.8rem; opacity: 0.6;">ทุกวินาทีมีค่าเมื่ออยู่กับเธอ ❤️</p>
        </section>

        <section id="photo-sec">
            <h2 style="font-family: 'Prompt'; font-size: 1.4rem; color: var(--primary); margin-bottom: 35px; text-align: center;">Happy Anniversary</h2>
            <div class="heart-grid">
                <img src="photo1.jpg" class="img-item p1" onclick="zoomImg(this, 'น่ารักจังคะ')">
                <img src="photo2.jpg" class="img-item p2" onclick="zoomImg(this, 'มีคนคิดถึงมาหา')">
                <img src="photo3.jpg" class="img-item p3" onclick="zoomImg(this, 'เด่กติดเเฟน')">
                <img src="photo4.jpg" class="img-item p4" onclick="zoomImg(this, 'น่ารักช่ะม๊า')">
                <img src="photo5.jpg" class="img-item p5" onclick="zoomImg(this, 'จับมือกันเเน่นๆนะคะ')">
                <img src="photo6.jpg" class="img-item p6" onclick="zoomImg(this, 'สาวหวานน')">
                <img src="photo7.jpg" class="img-item p7" onclick="zoomImg(this, 'โอ้ะน่าร้ากก')">
                <img src="photo8.jpg" class="img-item p8" onclick="zoomImg(this, 'มีกำลังใจสอบระะ')">
                <img src="photo9.jpg" class="img-item p9" onclick="zoomImg(this, 'โอัะโอ่วว')">
                <img src="photo10.jpg" class="img-item p10" onclick="zoomImg(this, 'ปัดเป๋เรยย')">
            </div>
        </section>

        <section id="letter-sec">
            <div class="envelope-container">
                <div class="envelope" id="env" onclick="openLetter()">
                    <div class="paper" id="paper">
                        <div id="typewriter" style="font-size: 0.85rem; line-height: 1.6; color: #555;"></div>
                    </div>
                </div>
            </div>
        </section>

        <section id="fun-sec">
            <h3 style="color: var(--primary); margin-bottom: 40px;">เลือกของขวัญของคุณ! 🎁</h3>
            <div class="boxes-grid">
                <div class="gift-box" onclick="pickBox(this)">🎁</div>
                <div class="gift-box" onclick="pickBox(this)">🎁</div>
                <div class="gift-box" onclick="pickBox(this)">🎁</div>
                <div class="gift-box" onclick="pickBox(this)">🎁</div>
                <div class="gift-box" onclick="pickBox(this)">🎁</div>
            </div>
        </section>

        <nav>
            <a href="#time-sec">⏰</a>
            <a href="#photo-sec">🖼️</a>
            <a href="#letter-sec">✉️</a>
            <a href="#fun-sec">🎁</a>
        </nav>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content" id="modal-box">
            <div id="photo-area">
                <div class="polaroid">
                    <img id="modal-img" src="">
                    <div id="img-caption" class="polaroid-text"></div>
                </div>
            </div>
            <div id="coupon-area" style="display: none;">
                <div class="ticket">
                    <div class="ticket-header">LOVE COUPON</div>
                    <div class="ticket-content">
                        <div style="font-size: 0.7rem; color: #999;">คูปองนี้มอบให้...</div>
                        <div id="coupon-text" class="ticket-prize"></div>
                        <div style="font-size: 0.7rem; color: #999; margin-top: 5px;">แด่คนสำคัญของหัวใจ</div>
                    </div>
                    <div class="ticket-footer">* แคปหน้าจอเพื่อใช้สิทธิ์ได้ตลอดเวลา *</div>
                </div>
            </div>
            <button class="btn-close" onclick="closeModal()">ปิด ♡</button>
        </div>
    </div>

    <audio id="bgm" loop><source src="song.mp3" type="audio/mpeg"></audio>

    <script>
        let pass = "";
        const target = "250425";
        const errorMsgs = ["รหัสผิดนะเจ้าคนดี 🥺", "จำไม่ได้หรอเนี่ย งอนละนะ! 😤", "เกือบถูกแล้ว ลองอีกนิดดด", "อ๊ะ! ผิดแล้วตัวแสบ 😜"];

        function addNum(n) {
            if(pass.length < 6) {
                pass += n;
                document.querySelectorAll('.dot').forEach((d,i) => d.classList.toggle('active', i < pass.length));
                if(pass.length === 6) {
                    if(pass === target) {
                        document.getElementById('login-page').style.display = 'none';
                        document.getElementById('main-app').style.display = 'block';
                        document.getElementById('bgm').play().catch(() => {});
                        startTimer();
                    } else {
                        document.getElementById('error-msg').innerText = errorMsgs[Math.floor(Math.random()*errorMsgs.length)];
                        document.getElementById('login-page').classList.add('shake');
                        setTimeout(() => { document.getElementById('login-page').classList.remove('shake'); clearPass(); }, 400);
                    }
                }
            }
        }
        function clearPass() { pass = ""; document.querySelectorAll('.dot').forEach(d => d.classList.remove('active')); }

        function startTimer() {
            const start = new Date("2025-04-25T00:00:00");
            setInterval(() => {
                const now = new Date();
                let y = now.getFullYear() - start.getFullYear();
                let m = now.getMonth() - start.getMonth();
                let d = now.getDate() - start.getDate();
                if(d < 0) { m--; let prev = new Date(now.getFullYear(), now.getMonth(), 0); d += prev.getDate(); }
                if(m < 0) { y--; m += 12; }
                document.getElementById('y').innerText = y;
                document.getElementById('m').innerText = m;
                document.getElementById('d').innerText = d;
                document.getElementById('ch').innerText = String(now.getHours()).padStart(2,'0');
                document.getElementById('cm').innerText = String(now.getMinutes()).padStart(2,'0');
                document.getElementById('cs').innerText = String(now.getSeconds()).padStart(2,'0');
            }, 1000);
        }

        function zoomImg(el, caption) {
            document.getElementById('photo-area').style.display = 'block';
            document.getElementById('coupon-area').style.display = 'none';
            document.getElementById('modal-img').src = el.src;
            document.getElementById('img-caption').innerText = caption;
            document.getElementById('modal').classList.add('active');
        }

        function openLetter() {
            document.getElementById('env').classList.add('open');
            const msg = "ไม่ต้องเก่งมากก็ได้ค่อยๆเติบโตไปพร้อมกัน\nเค้าจะคอยอยู่ข้างๆเธอเอง\nเธอหันมาก็จะเจอเค้าตลอดเลยนะ\nเค้าจะคอยซัพพอร์ตเธอในทุกๆเรื่อง\nจะไม่ปล่อยให้เธอต้องอยู่คนเดียว\nจะไม่ทำให้เธอต้องลำบากใจ\nจะคอยเป็นที่ระบายอารมณ์ให้เธอ\nเค้าคนนี้จะคอยอยู่ข้างๆเธอไปตลอดเองนะคะ\nตั้งแต่วันแรกจนถึงวันนี้ไม่เคยรู้สึก\nไม่โชคดีที่ได้เจอแต่กลับเป็นความโชคดี\nที่ไม่อยากให้หายไปไหนเลยอยู่ให้รักนานๆเลยนะ\nผ่านอะไรอีกหลายๆอย่างที่เรา ต้องเจอ\nในทางข้างหน้าไปด้วยกันนะ\nขอบคุณเธอที่เข้ามานะคะ\nเค้ารักเธอมาตลอดเลยก่อนรู้จักชื่อซะอีก\nเค้าขอให้เเฟนยิ้มเย้อๆ\nยิ้มแฟนสวยมากเรยนะคะ\nแย่จางงวันครบนี่ไม่ได้ยุด้วยกัน\nเเต่ยังรักเหมือเดอมนะคะะมากกว่าเดิมอีกก\nอย่าคิดว่าเค้าไม่รักเลยนะคะะ\nเค้ารักเธอที่สุดแล้วค่ะะ\n”กานต์สิริ..”🫠";
            let i = 0;
            if(document.getElementById('typewriter').innerHTML === "") {
                function type() {
                    if (i < msg.length) {
                        document.getElementById('typewriter').innerHTML += msg.charAt(i) === '\n' ? '<br>' : msg.charAt(i);
                        i++; document.getElementById('paper').scrollTop = document.getElementById('paper').scrollHeight;
                        setTimeout(type, 50);
                    }
                }
                setTimeout(type, 1000);
            }
        }

        // --- Updated Prizes ---
        const prizes = ["ตามใจ 1 ชิ้น", "เจลลี่แคท", "ดอกไม้", "กล่องสุ่ม", "กล่องสุ่มดอกไม้เจลลี่เเคท"];
        
        function pickBox(el) {
            if(el.innerText === "✨") return; // ป้องกันการกดซ้ำ
            el.classList.add('box-shake');
            setTimeout(() => {
                const prize = prizes[Math.floor(Math.random()*prizes.length)];
                document.getElementById('photo-area').style.display = 'none';
                document.getElementById('coupon-area').style.display = 'block';
                document.getElementById('coupon-text').innerText = prize;
                document.getElementById('modal').classList.add('active');
                el.classList.remove('box-shake');
                el.innerText = "✨";
            }, 800);
        }

        function closeModal() { document.getElementById('modal').classList.remove('active'); }
    </script>
</body>
</html>
